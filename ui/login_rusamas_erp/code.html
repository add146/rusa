        .material-symbols-outlined {

<body class="bg-background min-h-screen flex items-center justify-center p-page-padding">
<!-- Login Container -->
<main class="w-full max-w-[440px]">
<!-- Brand / Header -->
<div class="text-center mb-section-gap">
<div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-surface-container-high text-primary mb-4">
<span class="material-symbols-outlined text-[32px]">domain</span>
</div>
<h1 class="font-h2 text-h2 text-primary">Rusamas ERP</h1>
<p class="font-body-md text-body-md text-on-surface-variant mt-2">Enterprise Management System</p>
</div>
<!-- Login Card -->
<div class="bg-surface-container-lowest rounded-xl shadow-[0px_4px_20px_rgba(30,58,138,0.08)] border border-surface-container-high p-8">
<h2 class="font-h3 text-h3 text-on-surface mb-6">Masuk ke akun Anda</h2>
<form action="#" class="flex flex-col gap-5" method="POST">
<!-- Email Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="email">Email Perusahaan</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-DEFAULT bg-surface text-on-surface font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="email" name="email" placeholder="nama@rusamas.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div>
<label class="block font-label-md text-label-md text-on-surface mb-2" for="password">Password</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-outline">
<span class="material-symbols-outlined text-[20px]">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-DEFAULT bg-surface text-on-surface font-body-md text-body-md placeholder:text-outline-variant focus:outline-none focus:ring-2 focus:ring-primary focus:border-primary transition-colors" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<!-- Options Row -->
<div class="flex items-center justify-between mt-1 mb-2">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded text-primary-container bg-surface cursor-pointer" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant text-[14px] cursor-pointer" for="remember-me">
                            Ingat saya
                        </label>
</div>
<div class="text-sm">
<a class="font-label-md text-label-md text-primary hover:text-primary-container hover:underline transition-colors" href="#">
                            Lupa Password?
                        </a>
</div>
</div>
<!-- Submit Button -->
<button class="w-full flex justify-center py-3 px-4 border border-transparent rounded-DEFAULT bg-primary-container text-on-primary font-label-md text-label-md hover:bg-primary focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-primary transition-colors duration-200" type="submit">
                    Masuk
                </button>
</form>
</div>
<!-- Footer / Support -->
<div class="mt-8 text-center">
<p class="font-body-md text-body-md text-on-surface-variant text-[14px]">
                Butuh bantuan akses? <a class="text-primary hover:underline font-label-md text-label-md" href="#">Hubungi IT Support</a>
</p>
</div>
</main>
</body></html>
